<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#04040a"/>
  <!-- Neon purple glow bg -->
  <circle cx="16" cy="16" r="12" fill="url(#glow)" opacity="0.3"/>
  <!-- W lettermark -->
  <text x="4" y="23" font-family="Georgia, serif" font-style="italic" font-weight="900" font-size="22" fill="url(#neonGrad)">w</text>
  <!-- Accent dot -->
  <circle cx="27" cy="8" r="3" fill="#b4ff47" opacity="0.9"/>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#9d4eff"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d4eff"/>
      <stop offset="100%" stop-color="#b4ff47"/>
    </linearGradient>
  </defs>
</svg>
