<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WHISPR</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;overflow:hidden;background:#111110;font-family:'IBM Plex Mono',monospace;}

/* ─── GRID + NOISE ─── */
#app::before{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(245,242,235,0.025) 1px,transparent 1px),
  linear-gradient(90deg,rgba(245,242,235,0.025) 1px,transparent 1px);
  background-size:28px 28px;}
#app::after{content:'';position:absolute;inset:0;pointer-events:none;z-index:0;opacity:0.035;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");}

/* ─── SCANLINE ─── */
.scanline{position:fixed;left:0;right:0;height:2px;pointer-events:none;z-index:5;
  background:linear-gradient(transparent,rgba(245,242,235,0.04),transparent);
  animation:scan 7s linear infinite;}
@keyframes scan{0%{top:-3%}100%{top:103%}}

#app{position:fixed;inset:0;background:#111110;display:flex;flex-direction:column;overflow:hidden;}

/* ─── PROGRESS BARS ─── */
#bars{
  position:absolute;top:0;left:0;right:0;z-index:30;
  display:flex;gap:3px;padding:10px 14px 0;
}
.btrack{flex:1;height:2px;background:rgba(245,242,235,0.22);border-radius:2px;overflow:hidden;position:relative;}
.bfill{position:absolute;top:0;left:0;height:100%;background:#f5f2eb;border-radius:2px;width:0%;}

/* ─── HEADER ─── */
#hdr{
  position:absolute;top:20px;left:0;right:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;
}
.hdr-logo{font-size:13px;font-weight:700;letter-spacing:0.2em;color:#f5f2eb;}
.hdr-right{display:flex;align-items:center;gap:10px;}
.hdr-num{font-size:10px;color:rgba(245,242,235,0.35);letter-spacing:0.1em;}
#mute-btn{
  background:none;border:1px solid rgba(245,242,235,0.18);
  color:rgba(245,242,235,0.45);padding:4px 10px;
  font-family:'IBM Plex Mono',monospace;font-size:9px;
  cursor:pointer;letter-spacing:0.1em;transition:all 0.2s;
}
#mute-btn:hover{border-color:rgba(245,242,235,0.4);color:rgba(245,242,235,0.7);}

/* ─── TAP ZONES ─── */
#tap-l,#tap-r{
  position:absolute;top:0;bottom:0;width:38%;z-index:20;cursor:pointer;
}
#tap-l{left:0;}
#tap-r{right:0;}

/* ─── PAUSE INDICATOR ─── */
#pause-dot{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:40;pointer-events:none;
  width:40px;height:40px;border-radius:50%;
  background:rgba(0,0,0,0.45);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;color:rgba(245,242,235,0.7);
  opacity:0;transition:opacity 0.2s;
}
#pause-dot.show{opacity:1;}

/* ─── SLIDE AREA ─── */
#slide{
  position:absolute;inset:0;z-index:10;
  display:flex;align-items:center;justify-content:center;
  padding:64px 20px 96px;
  overflow:hidden;
}

/* ─── SLIDE INNER ─── */
.si{
  position:relative;z-index:10;
  width:100%;max-width:440px;
  display:flex;flex-direction:column;align-items:center;
}

/* ─── ANIMATIONS ─── */
@keyframes fromRight{from{opacity:0;transform:translateX(22px)}to{opacity:1;transform:translateX(0)}}
@keyframes fromLeft{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:translateX(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.anim-r{animation:fromRight 0.3s cubic-bezier(0.25,0.46,0.45,0.94);}
.anim-l{animation:fromLeft 0.3s cubic-bezier(0.25,0.46,0.45,0.94);}

/* ─── RECEIPT ─── */
.rc{
  background:#f5f2eb;color:#1a1a18;
  padding:20px 18px;width:100%;
  position:relative;
  box-shadow:0 8px 40px rgba(0,0,0,0.65),0 2px 8px rgba(0,0,0,0.4);
}
.tt::before{content:'';position:absolute;top:-9px;left:0;right:0;height:9px;background:#f5f2eb;
  clip-path:polygon(0% 100%,2% 0%,4% 100%,6% 0%,8% 100%,10% 0%,12% 100%,14% 0%,16% 100%,18% 0%,20% 100%,22% 0%,24% 100%,26% 0%,28% 100%,30% 0%,32% 100%,34% 0%,36% 100%,38% 0%,40% 100%,42% 0%,44% 100%,46% 0%,48% 100%,50% 0%,52% 100%,54% 0%,56% 100%,58% 0%,60% 100%,62% 0%,64% 100%,66% 0%,68% 100%,70% 0%,72% 100%,74% 0%,76% 100%,78% 0%,80% 100%,82% 0%,84% 100%,86% 0%,88% 100%,90% 0%,92% 100%,94% 0%,96% 100%,98% 0%,100% 100%);}
.tb::after{content:'';position:absolute;bottom:-9px;left:0;right:0;height:9px;background:#f5f2eb;
  clip-path:polygon(0% 0%,2% 100%,4% 0%,6% 100%,8% 0%,10% 100%,12% 0%,14% 100%,16% 0%,18% 100%,20% 0%,22% 100%,24% 0%,26% 100%,28% 0%,30% 100%,32% 0%,34% 100%,36% 0%,38% 100%,40% 0%,42% 100%,44% 0%,46% 100%,48% 0%,50% 100%,52% 0%,54% 100%,56% 0%,58% 100%,60% 0%,62% 100%,64% 0%,66% 100%,68% 0%,70% 100%,72% 0%,74% 100%,76% 0%,78% 100%,80% 0%,82% 100%,84% 0%,86% 100%,88% 0%,90% 100%,92% 0%,94% 100%,96% 0%,98% 100%,100% 0%);}

.dash{height:1px;margin:10px 0;background:repeating-linear-gradient(to right,#1a1a18 0,#1a1a18 5px,transparent 5px,transparent 10px);}
.row{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;padding:3px 0;}
.lbl{font-size:10px;color:#6b6b67;}
.infobox{background:#ede9df;border:1px solid #c5c5bf;padding:9px 11px;margin-top:10px;font-size:10px;color:#3d3d3a;line-height:1.85;}
.infobox-title{font-size:9px;color:#9b9b96;letter-spacing:0.08em;margin-bottom:4px;}
.dkbar{background:#1a1a18;color:#f5f2eb;padding:14px 16px;margin:-20px -18px 14px;text-align:center;}

/* ─── FEATURE TAG ─── */
.ftag{font-size:9px;color:rgba(245,242,235,0.28);letter-spacing:0.22em;margin-bottom:14px;text-transform:uppercase;text-align:center;}

/* ─── MISC COMPONENTS ─── */
.ldot{width:7px;height:7px;border-radius:50%;background:#22c55e;display:inline-block;animation:lp 2s ease infinite;vertical-align:middle;}
@keyframes lp{0%,100%{box-shadow:0 0 0 0 rgba(34,197,94,0.5)}50%{box-shadow:0 0 0 6px rgba(34,197,94,0)}}

.chip{display:inline-flex;align-items:center;gap:3px;padding:4px 9px;font-size:11px;border:1px solid;font-family:'IBM Plex Mono',monospace;}
.ci{background:#1a1a18;color:#f5f2eb;border-color:#1a1a18;}
.co{color:#6b6b67;border-color:#c5c5bf;}

.rbub{background:#ede9df;border:1px solid #c5c5bf;padding:8px 10px;margin-bottom:5px;font-size:11px;line-height:1.65;}
.rbub .who{font-size:9px;color:#9b9b96;margin-bottom:3px;}

.plat-row{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;font-size:11px;border:1px solid #c5c5bf;margin-bottom:4px;transition:all 0.15s;}
.plat-row.sel{background:#1a1a18;color:#f5f2eb;border-color:#1a1a18;}

.eopt{display:flex;justify-content:space-between;align-items:center;padding:7px 9px;font-size:11px;border:1px solid #c5c5bf;margin-bottom:4px;color:#6b6b67;}
.eopt.act{border-color:#1a1a18;font-weight:700;color:#1a1a18;}

.pwdot{width:10px;height:10px;border-radius:50%;border:1.5px solid #9b9b96;display:inline-block;margin:0 3px;transition:all 0.15s;}
.pwdot.on{background:#1a1a18;border-color:#1a1a18;}

.prow{display:flex;align-items:center;justify-content:space-between;padding:6px 8px;background:#ede9df;border:1px solid #c5c5bf;margin-bottom:4px;font-size:10px;}

.uptrack{height:5px;background:#e0dbd0;border:1px solid #c5c5bf;position:relative;overflow:hidden;}
.upfill{position:absolute;top:0;left:0;height:100%;background:#1a1a18;width:0%;transition:width 0.12s linear;}

.cur{display:inline-block;width:1px;height:1em;background:#1a1a18;vertical-align:middle;animation:bl 0.7s step-end infinite;margin-left:1px;}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0}}

/* ─── BOTTOM CTA ─── */
#cta{
  position:absolute;bottom:0;left:0;right:0;z-index:30;
  padding:14px 18px 26px;
  display:flex;gap:8px;
  background:linear-gradient(transparent,rgba(17,17,16,0.95) 40%);
}
#btn-create{
  flex:1;padding:12px;
  background:#f5f2eb;color:#111110;border:none;
  font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;
  letter-spacing:0.1em;cursor:pointer;
}
#btn-join{
  padding:12px 16px;
  background:transparent;color:rgba(245,242,235,0.55);
  border:1px solid rgba(245,242,235,0.18);
  font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;
  letter-spacing:0.1em;cursor:pointer;
}

/* ─── END SCREEN ─── */
#end{
  position:fixed;inset:0;z-index:200;
  background:#f5f2eb;color:#1a1a18;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  padding:40px 24px;
  font-family:'IBM Plex Mono',monospace;
}
#end.on{display:flex;animation:fadeUp 0.5s ease;}
</style>
</head>
<body>
<div class="scanline"></div>

<div id="app">
  <div id="bars"></div>

  <div id="hdr">
    <span class="hdr-logo">WHISPR</span>
    <div class="hdr-right">
      <span class="hdr-num" id="hdr-n"></span>
      <button id="mute-btn" onclick="toggleMute(event)">&#9834; ON</button>
    </div>
  </div>

  <div id="tap-l"></div>
  <div id="tap-r"></div>
  <div id="pause-dot">&#10074;&#10074;</div>

  <div id="slide"></div>

  <div id="cta">
    <button id="btn-create" onclick="goSite()">CREATE A BOARD</button>
    <button id="btn-join" onclick="goSite()">JOIN</button>
  </div>
</div>

<div id="end">
  <div style="max-width:340px;width:100%;text-align:center;">
    <div style="font-size:34px;font-weight:700;letter-spacing:0.15em;margin-bottom:6px;">WHISPR</div>
    <div style="font-size:10px;color:#6b6b67;letter-spacing:0.1em;margin-bottom:24px;">ANONYMOUS CONFESSIONS CO.</div>
    <div style="height:1px;background:repeating-linear-gradient(to right,#1a1a18 0,#1a1a18 5px,transparent 5px,transparent 10px);margin-bottom:20px;"></div>
    <div style="display:flex;flex-direction:column;gap:9px;margin-bottom:20px;">
      <button onclick="goSite()" style="padding:13px;background:#1a1a18;color:#f5f2eb;border:none;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;letter-spacing:0.1em;cursor:pointer;">[01] CREATE A BOARD</button>
      <button onclick="goSite()" style="padding:13px;background:transparent;color:#1a1a18;border:1px solid #1a1a18;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;letter-spacing:0.1em;cursor:pointer;">[02] JOIN WITH CODE</button>
      <button onclick="watchAgain()" style="padding:10px;background:transparent;border:1px dashed #c5c5bf;color:#9b9b96;font-family:'IBM Plex Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:0.08em;">&#9654; WATCH AGAIN</button>
    </div>
    <div style="font-size:10px;color:#9b9b96;">whispr.name.ng &middot; FREE &middot; 100% ANONYMOUS</div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════════════
var AC = null, MG = null, muted = false, beatRunning = false, beatKill = false;

function ctx() {
  if (!AC) {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    MG = AC.createGain(); MG.gain.value = 0.78; MG.connect(AC.destination);
  }
  if (AC.state === 'suspended') AC.resume();
  return AC;
}

function toggleMute(e) {
  if (e) e.stopPropagation();
  muted = !muted;
  if (MG) MG.gain.setTargetAtTime(muted ? 0 : 0.78, AC.currentTime, 0.1);
  document.getElementById('mute-btn').textContent = muted ? '✕ OFF' : '♪ ON';
}

// Kill audio on page leave — hard stop
function killAudio() {
  beatKill = true; beatRunning = false;
  if (AC) { try { AC.suspend(); } catch(e) {} }
}
document.addEventListener('visibilitychange', function() {
  if (document.hidden) { killAudio(); }
  else {
    beatKill = false;
    if (AC && AC.state === 'suspended') AC.resume();
    if (!beatRunning) scheduleBeat();
  }
});
window.addEventListener('pagehide', killAudio);
window.addEventListener('beforeunload', killAudio);
window.addEventListener('blur', killAudio);
window.addEventListener('focus', function() {
  beatKill = false;
  if (AC && AC.state === 'suspended') AC.resume();
  if (!beatRunning) scheduleBeat();
});

// ── Drum primitives ──
function kick(t) {
  try {
    var c = ctx(), o = c.createOscillator(), g = c.createGain();
    o.frequency.setValueAtTime(155, t);
    o.frequency.exponentialRampToValueAtTime(36, t + 0.1);
    g.gain.setValueAtTime(1.1, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    o.connect(g); g.connect(MG);
    o.start(t); o.stop(t + 0.35);
  } catch(e) {}
}

function snare(t) {
  try {
    var c = ctx();
    // noise burst
    var buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.14), c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < d.length; i++)
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.5);
    var src = c.createBufferSource(), bp = c.createBiquadFilter(), gn = c.createGain();
    bp.type = 'bandpass'; bp.frequency.value = 3000; bp.Q.value = 0.7;
    gn.gain.setValueAtTime(0.55, t); gn.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    src.buffer = buf; src.connect(bp); bp.connect(gn); gn.connect(MG);
    src.start(t); src.stop(t + 0.16);
    // body tone
    var o = c.createOscillator(), g2 = c.createGain();
    o.type = 'triangle'; o.frequency.setValueAtTime(195, t); o.frequency.exponentialRampToValueAtTime(155, t + 0.06);
    g2.gain.setValueAtTime(0.22, t); g2.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
    o.connect(g2); g2.connect(MG); o.start(t); o.stop(t + 0.1);
  } catch(e) {}
}

function hat(t, vel, open) {
  vel = vel || 0.13;
  try {
    var c = ctx();
    var dur = open ? 0.12 : 0.03;
    var buf = c.createBuffer(1, Math.floor(c.sampleRate * dur), c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < d.length; i++)
      d[i] = (Math.random() * 2 - 1) * (open ? Math.exp(-i / (c.sampleRate * 0.04)) : 1);
    var src = c.createBufferSource(), hp = c.createBiquadFilter(), g = c.createGain();
    hp.type = 'highpass'; hp.frequency.value = 8500;
    g.gain.setValueAtTime(vel, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.buffer = buf; src.connect(hp); hp.connect(g); g.connect(MG);
    src.start(t); src.stop(t + dur + 0.01);
  } catch(e) {}
}

function bassNote(t, freq, dur) {
  try {
    var c = ctx(), o = c.createOscillator(), lp = c.createBiquadFilter(), g = c.createGain();
    o.type = 'sawtooth'; o.frequency.value = freq;
    lp.type = 'lowpass'; lp.frequency.value = 290; lp.Q.value = 1.6;
    // pluck envelope
    g.gain.setValueAtTime(0.001, t);
    g.gain.linearRampToValueAtTime(0.7, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(lp); lp.connect(g); g.connect(MG);
    o.start(t); o.stop(t + dur + 0.02);
  } catch(e) {}
}

function chordStab(t, freqs) {
  freqs.forEach(function(f) {
    try {
      var c = ctx(), o = c.createOscillator(), lp = c.createBiquadFilter(), g = c.createGain();
      o.type = 'sawtooth'; o.frequency.value = f;
      lp.type = 'lowpass'; lp.frequency.value = 700; lp.Q.value = 1.0;
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.055, t + 0.012);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      o.connect(lp); lp.connect(g); g.connect(MG);
      o.start(t); o.stop(t + 0.25);
    } catch(e) {}
  });
}

function vinyl(t) {
  try {
    var c = ctx();
    var buf = c.createBuffer(1, Math.floor(c.sampleRate * 0.006), c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < d.length; i++)
      d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (c.sampleRate * 0.0015));
    var src = c.createBufferSource(), g = c.createGain();
    g.gain.value = 0.04;
    src.buffer = buf; src.connect(g); g.connect(MG); src.start(t);
  } catch(e) {}
}

// ── BEAT SCHEDULER ──
// 82 BPM, 16th-note steps, 2-bar pattern (32 steps)
// C minor feel: C D Eb F G
var BPM = 82;
var STEP = 60 / BPM / 4; // 16th note in seconds

// bass pattern: [step, freq_Hz, dur_beats]
var BASS = [
  [0, 65.4, 1.8],   // C2
  [3, 65.4, 0.9],
  [4, 73.4, 1.2],   // D2
  [6, 65.4, 0.8],
  [8, 77.8, 1.8],   // Eb2
  [11,65.4, 0.9],
  [12,87.3, 1.4],   // F2
  [14,65.4, 0.8],
  [16,65.4, 1.8],
  [19,65.4, 0.9],
  [20,61.7, 1.2],   // B1
  [22,65.4, 0.8],
  [24,77.8, 1.8],
  [27,65.4, 0.9],
  [28,87.3, 2.2],
  [30,73.4, 0.8],
];

// chord stabs [step, freqs]
var CHORDS = [
  [4,  [196.0, 233.1, 293.7]],   // Gm  G3 Bb3 D4
  [12, [174.6, 207.7, 261.6]],   // Fm  F3 Ab3 C4
  [20, [155.6, 185.0, 233.1]],   // Ebm Eb3 G3 Bb3
  [28, [174.6, 207.7, 261.6]],   // Fm
];

function scheduleBeat() {
  if (beatRunning) return;
  beatRunning = true; beatKill = false;
  var c = ctx();
  var step = 0;
  var PAT = 32; // steps per pattern

  function sched(startTime, step) {
    if (beatKill) { beatRunning = false; return; }
    var s = step % PAT;

    // Drums
    if (s === 0 || s === 8)  kick(startTime);
    if (s === 4 || s === 12) snare(startTime);
    // Hi-hats: closed on every 8th note, open on upbeats
    if (s % 2 === 0) hat(startTime, 0.13, false);
    if (s === 6 || s === 14 || s === 22 || s === 30) hat(startTime, 0.11, true);
    // Ghost snare (soft)
    if (s === 2 || s === 10 || s === 18 || s === 26) hat(startTime, 0.04, false);

    // Bass
    BASS.forEach(function(b) {
      if (b[0] === s) bassNote(startTime, b[1], b[2] * STEP);
    });

    // Chords
    CHORDS.forEach(function(ch) {
      if (ch[0] === s) chordStab(startTime, ch[1]);
    });

    // Random vinyl crackle
    if (Math.random() > 0.9) vinyl(startTime + Math.random() * STEP * 0.6);

    var nextTime = startTime + STEP;
    var delay = Math.max(0, (nextTime - c.currentTime - 0.08) * 1000);
    setTimeout(function() { sched(nextTime, step + 1); }, delay);
  }

  sched(c.currentTime + 0.1, 0);
}

// ═══════════════════════════════════════════════════════════
// SLIDES
// ═══════════════════════════════════════════════════════════
var SLIDES = [
  // ── 0: HERO ──
  {
    dur: 6500,
    bg: '#111110',
    render: function(el) {
      el.innerHTML =
        '<div style="text-align:center;">' +
          '<div style="font-size:10px;color:rgba(245,242,235,0.2);letter-spacing:0.22em;margin-bottom:10px;">ANONYMOUS CONFESSIONS CO.</div>' +
          '<div style="font-size:clamp(56px,15vw,92px);font-weight:700;letter-spacing:0.14em;line-height:1;color:#f5f2eb;">WHISPR</div>' +
          '<div style="font-size:10px;color:rgba(245,242,235,0.3);letter-spacing:0.15em;margin-top:8px;">EST. 2025 &middot; whispr.name.ng</div>' +

// ═══════════════════════════════════════════════════════════
// STORY ENGINE
// ═══════════════════════════════════════════════════════════
var CUR = 0, TOTAL = SLIDES.length;
var rafId = null, progStart = null, progDur = 0, progPaused = false, progElapsed = 0;
var holdTimer = null, touchStartX = 0, touchStartTime = 0;

function buildBars() {
  var el = document.getElementById('bars'); el.innerHTML = '';
  for (var i = 0; i < TOTAL; i++) {
    var t = document.createElement('div'); t.className = 'btrack';
    var f = document.createElement('div'); f.className = 'bfill'; f.id = 'bf'+i;
    t.appendChild(f); el.appendChild(t);
  }
}

function syncBars(idx, frac) {
  for (var i = 0; i < TOTAL; i++) {
    var f = document.getElementById('bf'+i); if (!f) continue;
    if (i < idx) f.style.width = '100%';
    else if (i === idx) f.style.width = (frac * 100) + '%';
    else f.style.width = '0%';
  }
}

function stopProg() {
  if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
}

function startProg(dur, startFrac) {
  stopProg();
  startFrac = startFrac || 0;
  progDur = dur * (1 - startFrac);
  progElapsed = 0;
  progStart = performance.now();
  progPaused = false;

  function tick(now) {
    if (progPaused) return;
    var dt = now - progStart;
    var frac = startFrac + Math.min(dt / (dur * (1 - startFrac)), 1) * (1 - startFrac);
    syncBars(CUR, frac);
    if (frac >= 1) { goSlide(CUR + 1, 1); }
    else { rafId = requestAnimationFrame(tick); }
  }
  rafId = requestAnimationFrame(tick);
}

function pauseProg() {
  if (progPaused) return;
  progPaused = true;
  progElapsed = performance.now() - progStart;
  stopProg();
  document.getElementById('pause-dot').classList.add('show');
}

function resumeProg() {
  if (!progPaused) return;
  progPaused = false;
  // Recalculate remaining
  var dur = SLIDES[CUR].dur || 7000;
  var elapsed = progElapsed;
  var frac = elapsed / dur;
  progStart = performance.now();
  document.getElementById('pause-dot').classList.remove('show');

  function tick(now) {
    if (progPaused) return;
    var dt = now - progStart;
    var f2 = frac + Math.min(dt / (dur - elapsed), 1) * (1 - frac);
    syncBars(CUR, f2);
    if (f2 >= 1) { goSlide(CUR + 1, 1); }
    else { rafId = requestAnimationFrame(tick); }
  }
  rafId = requestAnimationFrame(tick);
}

function goSlide(idx, dir) {
  // dir: 1 = forward (from right), -1 = backward (from left)
  if (idx < 0) idx = 0;
  if (idx >= TOTAL) { endShow(); return; }
  stopProg();
  CUR = idx;

  var sl = document.getElementById('slide');
  sl.innerHTML = '';
  var inner = document.createElement('div');
  inner.className = 'si ' + (dir >= 0 ? 'anim-r' : 'anim-l');
  sl.appendChild(inner);
  SLIDES[CUR].render(inner);

  document.getElementById('hdr-n').textContent = (CUR+1) + ' / ' + TOTAL;
  syncBars(CUR, 0);
  startProg(SLIDES[CUR].dur || 7000, 0);
}

// ── TAP ZONES ──
document.getElementById('tap-l').addEventListener('click', function(e) {
  e.stopPropagation();
  goSlide(CUR - 1, -1);
});
document.getElementById('tap-r').addEventListener('click', function(e) {
  e.stopPropagation();
  goSlide(CUR + 1, 1);
});

// ── HOLD TO PAUSE ──
var holdActive = false;
document.getElementById('app').addEventListener('touchstart', function(e) {
  var tgt = e.target;
  if (tgt.closest('#cta') || tgt.closest('#hdr')) return;
  touchStartX = e.touches[0].clientX;
  touchStartTime = Date.now();
  holdTimer = setTimeout(function() { holdActive = true; pauseProg(); }, 200);
}, {passive: true});

document.getElementById('app').addEventListener('touchend', function(e) {
  clearTimeout(holdTimer);
  if (holdActive) { holdActive = false; resumeProg(); }
}, {passive: true});

document.getElementById('app').addEventListener('mousedown', function(e) {
  if (e.target.closest('#cta') || e.target.closest('#hdr') || e.target.closest('#tap-l') || e.target.closest('#tap-r')) return;
  holdTimer = setTimeout(function() { holdActive = true; pauseProg(); }, 250);
});
document.addEventListener('mouseup', function() {
  clearTimeout(holdTimer);
  if (holdActive) { holdActive = false; resumeProg(); }
});

// ── END ──
function endShow() {
  stopProg(); killAudio();
  document.getElementById('end').classList.add('on');
}

function goSite() {
  killAudio();
  localStorage.setItem('whispr_intro_seen', '1');
  window.location.href = '/';
}

function watchAgain() {
  document.getElementById('end').classList.remove('on');
  CUR = 0; progPaused = false;
  beatKill = false; beatRunning = false;
  buildBars(); goSlide(0, 1); scheduleBeat();
}

// ── BOOT ──
buildBars();
goSlide(0, 1);

// Beat starts on first touch/click (browser autoplay policy)
var beatStarted = false;
function tryBeat() {
  if (beatStarted) return; beatStarted = true;
  scheduleBeat();
  document.removeEventListener('touchstart', tryBeat);
  document.removeEventListener('click', tryBeat);
}
document.addEventListener('touchstart', tryBeat, {passive: true});
document.addEventListener('click', tryBeat);
</script>
